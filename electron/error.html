<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TijaratPro - System Error</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
      border: 1px solid #333;
      border-radius: 12px;
      background-color: #111;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #aaa;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      background-color: transparent;
      color: #ffffff;
      border: 1px solid #444;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background-color: #222;
    }
    button.primary {
      background-color: #10b981;
      border-color: #10b981;
      color: #ffffff;
      font-weight: bold;
    }
    button.primary:hover {
      background-color: #059669;
      border-color: #059669;
    }
    .logo {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background-color: #10b981;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">T</div>
    </div>
    <h1>Application Error</h1>
    <p>TijaratPro encountered an unexpected error. Don't worry, your data is safe.</p>
    <div class="button-group">
      <button class="primary" onclick="window.electron.relaunch()">Restart Application</button>
      <button onclick="window.electron.openLogs()">Open Logs Folder</button>
      <button onclick="window.electron.quit()">Exit</button>
    </div>
  </div>
</body>
</html>
